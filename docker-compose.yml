services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcup"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "6379:6379"

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A app.workers.celery_app worker -B --loglevel=info

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres-data:
