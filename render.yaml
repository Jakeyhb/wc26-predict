services:
  - type: web
    name: wc26-predict-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POSTGRES_URL
        value: sqlite+aiosqlite:///./backend/data/local_stage2.db
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_API_KEY
        fromEnvVar: RENDER_LLM_API_KEY
      - key: LLM_MODEL
        value: deepseek-chat
      - key: ADMIN_TOKEN
        fromEnvVar: RENDER_ADMIN_TOKEN
      - key: CORS_ORIGINS
        value: https://dssxhydwp.shop,http://localhost:5173,http://127.0.0.1:5173
      - key: APP_BASE_URL
        value: https://wc26-predict-api.onrender.com
