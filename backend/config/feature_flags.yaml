# WC26 Predict — Feature Flags
# 2026-05-21: Updated — MarketCalibrator Phase 2 activated
# Controls optional modules and event types

feature_flags:
  # Market Baseline (betting odds as consensus benchmark)
  # Disabled per user request — project is pure statistical prediction, not betting
  market_baseline: false

  # Market Calibrator (internal blend, NOT displayed to users)
  # Phase 2 activated 2026-05-16, verified 2026-05-21
  # Uses The Odds API → vig-removed implied probs → ≤25% blend
  # Divergence >12pp triggers risk tag
  # NEVER displays raw odds or bookmaker names to users
  market_calibrator: true

  # ODDS_MOVEMENT event type
  # Tied to market_baseline — only re-enable if user explicitly approves
  # non-betting use of market consensus comparison
  odds_movement_event: false

  # Active event types (7, locked to these)
  event_types:
    - INJURY
    - SUSPENSION
    - LINEUP_CONFIRMED
    - LINEUP_RUMOR
    - ROTATION_HINT
    - MOTIVATION
    - WEATHER

# Rules:
# - ODDS_MOVEMENT is disabled. Do NOT re-add unless user explicitly approves.
# - MarketCalibrator is ACTIVE — market data used as internal feature only
# - No betting advice, no raw odds, no bookmaker names in reports
# - LLM must not invent event types beyond the 7 listed above.
